<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <title>Technoqueers — Archive</title>
  <meta content="Browse and search the Technoqueers email archive, 2016–2024." name="description">
  <meta content="width=device-width, initial-scale=1" name="viewport">
  <link href="css/normalize.css" rel="stylesheet" type="text/css">
  <link href="css/technoqueers.webflow.css" rel="stylesheet" type="text/css">
  <link href="images/favicon.png" rel="shortcut icon" type="image/x-icon">
  <style>
    *, *::before, *::after { box-sizing: border-box; }

    body {
      min-height: 100vh;
      background-color: #6e6e6e;
      margin: 0;
      padding: 0;
      font-family: Univers, sans-serif;
      color: #fff;
    }

    a { color: inherit; text-decoration: none; }

    .archive-wrap {
      max-width: 960px;
      margin: 0 auto;
      padding: 40px 24px 80px;
    }

    /* ── Header ── */
    .archive-header {
      display: flex;
      align-items: baseline;
      gap: 16px;
      margin-bottom: 36px;
    }

    .header-home {
      font-family: Univers, sans-serif;
      font-weight: 700;
      font-size: 17px;
      line-height: 17px;
      letter-spacing: 0.5px;
      text-transform: uppercase;
      color: #fff;
    }

    .header-home:hover { color: #000; }

    .header-sep {
      font-family: Univers, sans-serif;
      font-weight: 700;
      font-size: 17px;
      color: rgba(255,255,255,0.35);
    }

    .header-label {
      font-family: Univers, sans-serif;
      font-weight: 700;
      font-size: 17px;
      line-height: 17px;
      letter-spacing: 0.5px;
      text-transform: uppercase;
      color: rgba(255,255,255,0.5);
    }

    /* ── Search ── */
    .archive-search {
      margin-bottom: 32px;
    }

    .search-input {
      width: 100%;
      max-width: 480px;
      height: 40px;
      padding: 0 20px;
      border: 1px solid #000;
      border-radius: 20px;
      background: transparent;
      font-family: Univers, sans-serif;
      font-weight: 700;
      font-size: 17px;
      line-height: 17px;
      letter-spacing: 0.5px;
      text-transform: uppercase;
      color: #000;
      outline: none;
      -webkit-appearance: none;
      appearance: none;
    }

    .search-input::placeholder {
      color: rgba(0,0,0,0.35);
    }

    /* ── Layout ── */
    .archive-layout {
      display: flex;
      gap: 48px;
      align-items: flex-start;
    }

    /* ── Sidebar nav ── */
    .archive-nav {
      flex: 0 0 140px;
    }

    .nav-year {
      display: block;
      width: 100%;
      font-family: Univers, sans-serif;
      font-weight: 700;
      font-size: 17px;
      line-height: 17px;
      letter-spacing: 0.5px;
      text-transform: uppercase;
      color: #fff;
      background: transparent;
      border: 1px solid transparent;
      border-radius: 10px;
      padding: 6px 10px;
      margin-bottom: 2px;
      cursor: pointer;
      text-align: left;
    }

    .nav-year:hover { background: rgba(0,0,0,0.15); }

    .nav-year.active {
      color: #000;
      background: #fff;
    }

    .nav-months {
      padding-left: 10px;
      margin-bottom: 8px;
      display: none;
    }

    .nav-months.open { display: block; }

    .nav-month {
      display: block;
      width: 100%;
      font-family: Univers, sans-serif;
      font-weight: 700;
      font-size: 13px;
      line-height: 13px;
      letter-spacing: 0.5px;
      text-transform: uppercase;
      color: rgba(255,255,255,0.65);
      background: transparent;
      border: 1px solid transparent;
      border-radius: 8px;
      padding: 5px 8px;
      margin-bottom: 1px;
      cursor: pointer;
      text-align: left;
    }

    .nav-month:hover { color: #fff; background: rgba(0,0,0,0.15); }

    .nav-month.active {
      color: #000;
      background: rgba(255,255,255,0.8);
    }

    .nav-count {
      font-size: 11px;
      opacity: 0.55;
      margin-left: 3px;
    }

    /* ── Email list ── */
    .archive-list {
      flex: 1;
      min-width: 0;
    }

    .list-status {
      font-family: Univers, sans-serif;
      font-weight: 700;
      font-size: 13px;
      letter-spacing: 0.5px;
      text-transform: uppercase;
      color: rgba(255,255,255,0.4);
      margin-bottom: 16px;
    }

    .group-header {
      font-family: Univers, sans-serif;
      font-weight: 700;
      font-size: 13px;
      letter-spacing: 1px;
      text-transform: uppercase;
      color: rgba(255,255,255,0.4);
      padding: 16px 0 6px;
      border-bottom: 1px solid rgba(255,255,255,0.15);
      margin-bottom: 4px;
    }

    .group-header:first-child { padding-top: 0; }

    .email-item {
      display: flex;
      align-items: baseline;
      gap: 16px;
      padding: 7px 0;
      border-bottom: 1px solid rgba(0,0,0,0.12);
    }

    .email-date {
      flex: 0 0 94px;
      font-family: Univers, sans-serif;
      font-weight: 700;
      font-size: 13px;
      letter-spacing: 0.5px;
      text-transform: uppercase;
      color: rgba(255,255,255,0.45);
      white-space: nowrap;
    }

    .email-title {
      font-family: Univers, sans-serif;
      font-weight: 700;
      font-size: 17px;
      line-height: 20px;
      letter-spacing: 0.5px;
      text-transform: uppercase;
      color: #fff;
    }

    .email-title:hover { color: #000; }

    .list-empty {
      font-family: Univers, sans-serif;
      font-weight: 700;
      font-size: 17px;
      letter-spacing: 0.5px;
      text-transform: uppercase;
      color: rgba(255,255,255,0.35);
      padding: 20px 0;
    }

    /* ── Mobile ── */
    @media screen and (max-width: 767px) {
      .archive-wrap { padding: 24px 16px 60px; }

      .archive-layout {
        flex-direction: column;
        gap: 24px;
      }

      .archive-nav {
        flex: none;
        width: 100%;
        display: flex;
        flex-wrap: wrap;
        gap: 4px;
        align-items: flex-start;
      }

      .nav-year {
        flex: 0 0 auto;
        width: auto;
        margin-bottom: 0;
      }

      .nav-months {
        width: 100%;
        padding-left: 0;
        display: none;
        flex-wrap: wrap;
        gap: 4px;
        margin-bottom: 0;
        order: 99;
      }

      .nav-months.open { display: flex; }

      .nav-month {
        flex: 0 0 auto;
        width: auto;
      }
    }

    @media screen and (max-width: 479px) {
      .search-input { font-size: 13px; }
      .email-title { font-size: 14px; line-height: 18px; }
      .email-date { font-size: 11px; flex: 0 0 80px; }
    }
  </style>
</head>
<body>
  <div class="archive-wrap">
    <div class="archive-header">
      <a href="/" class="header-home">technoqueers</a>
      <span class="header-sep">/</span>
      <span class="header-label">archive</span>
    </div>

    <div class="archive-search">
      <input type="text" id="search-input" class="search-input" placeholder="search" autocomplete="off" spellcheck="false">
    </div>

    <div class="archive-layout">
      <nav class="archive-nav" id="year-nav" aria-label="Browse by year"></nav>
      <div class="archive-list" id="email-list" aria-live="polite"></div>
    </div>
  </div>

  <script>
  (function () {
    var all = [];
    var activeYear = null;
    var activeMonth = null;
    var query = '';

    fetch('emails/data.json')
      .then(function (r) { return r.json(); })
      .then(function (data) {
        all = data; // already sorted newest-first by build script
        activeYear = all[0].year;
        render();
      });

    document.getElementById('search-input').addEventListener('input', function (e) {
      query = e.target.value.trim().toLowerCase();
      if (query) {
        activeYear = null;
        activeMonth = null;
      } else if (!activeYear) {
        activeYear = all[0].year;
      }
      render();
    });

    /* ── Data helpers ── */

    function years() {
      var seen = {}, out = [];
      all.forEach(function (c) {
        if (!seen[c.year]) { seen[c.year] = 0; out.push(c.year); }
        seen[c.year]++;
      });
      out.sort(function (a, b) { return b - a; });
      return out.map(function (y) {
        return { year: y, count: all.filter(function (c) { return c.year === y; }).length };
      });
    }

    function monthsForYear(year) {
      var map = {};
      all.forEach(function (c) {
        if (c.year !== year) return;
        if (!map[c.month]) map[c.month] = { num: c.month, name: c.monthName, count: 0 };
        map[c.month].count++;
      });
      return Object.values(map).sort(function (a, b) { return b.num - a.num; });
    }

    function filtered() {
      if (query) {
        return all.filter(function (c) {
          return c.title.toLowerCase().indexOf(query) !== -1 ||
                 c.subject.toLowerCase().indexOf(query) !== -1 ||
                 (c.excerpt && c.excerpt.toLowerCase().indexOf(query) !== -1);
        });
      }
      return all.filter(function (c) {
        if (activeYear && c.year !== activeYear) return false;
        if (activeMonth && c.month !== activeMonth) return false;
        return true;
      });
    }

    /* ── Render nav ── */

    function renderNav() {
      var nav = document.getElementById('year-nav');

      if (query) {
        nav.innerHTML = '';
        return;
      }

      var html = '';
      years().forEach(function (y) {
        var isActive = y.year === activeYear;
        html += '<button class="nav-year' + (isActive ? ' active' : '') +
                '" data-year="' + y.year + '">' +
                y.year + '<span class="nav-count">(' + y.count + ')</span></button>';

        if (isActive) {
          var months = monthsForYear(y.year);
          html += '<div class="nav-months' + (isActive ? ' open' : '') + '">';
          html += '<button class="nav-month' + (!activeMonth ? ' active' : '') +
                  '" data-month="0">All</button>';
          months.forEach(function (m) {
            html += '<button class="nav-month' + (activeMonth === m.num ? ' active' : '') +
                    '" data-month="' + m.num + '">' +
                    m.name + '<span class="nav-count">(' + m.count + ')</span></button>';
          });
          html += '</div>';
        }
      });

      nav.innerHTML = html;

      nav.querySelectorAll('.nav-year').forEach(function (btn) {
        btn.addEventListener('click', function () {
          activeYear = parseInt(this.dataset.year);
          activeMonth = null;
          render();
        });
      });

      nav.querySelectorAll('.nav-month').forEach(function (btn) {
        btn.addEventListener('click', function () {
          var m = parseInt(this.dataset.month);
          activeMonth = m || null;
          render();
        });
      });
    }

    /* ── Render list ── */

    function renderList() {
      var list = document.getElementById('email-list');
      var items = filtered();

      if (!items.length) {
        list.innerHTML = '<div class="list-empty">no results</div>';
        return;
      }

      var html = '';

      if (query) {
        html += '<div class="list-status">' + items.length +
                ' result' + (items.length !== 1 ? 's' : '') + '</div>';
        items.forEach(function (c) { html += emailRow(c); });
        list.innerHTML = html;
        return;
      }

      if (activeMonth) {
        /* Month view — group by week */
        var weekGroups = {};
        var weekOrder = [];
        items.forEach(function (c) {
          var k = c.year + '-W' + pad(c.week);
          if (!weekGroups[k]) { weekGroups[k] = []; weekOrder.push(k); }
          weekGroups[k].push(c);
        });

        weekOrder.forEach(function (k) {
          var weekNum = parseInt(k.split('-W')[1]);
          html += '<div class="group-header">Week ' + weekNum + '</div>';
          weekGroups[k].forEach(function (c) { html += emailRow(c); });
        });
      } else {
        /* Year view — group by month */
        var monthGroups = {};
        var monthOrder = [];
        items.forEach(function (c) {
          var k = c.year + '-' + pad(c.month);
          if (!monthGroups[k]) { monthGroups[k] = []; monthOrder.push(k); }
          monthGroups[k].push(c);
        });

        monthOrder.forEach(function (k) {
          var sample = monthGroups[k][0];
          html += '<div class="group-header">' + sample.monthName + ' ' + sample.year + '</div>';
          monthGroups[k].forEach(function (c) { html += emailRow(c); });
        });
      }

      list.innerHTML = html;
    }

    function emailRow(c) {
      return '<div class="email-item">' +
             '<span class="email-date">' + c.date + '</span>' +
             '<a href="emails/' + esc(c.file) + '" class="email-title" target="_blank" rel="noopener">' +
             esc(c.title) + '</a>' +
             '</div>';
    }

    function render() {
      renderNav();
      renderList();
    }

    function pad(n) { return n < 10 ? '0' + n : '' + n; }

    function esc(s) {
      return String(s)
        .replace(/&/g, '&amp;')
        .replace(/</g, '&lt;')
        .replace(/>/g, '&gt;')
        .replace(/"/g, '&quot;');
    }
  }());
  </script>
</body>
</html>
