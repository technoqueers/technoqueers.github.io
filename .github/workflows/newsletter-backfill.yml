name: Backfill newsletters

on:
  workflow_dispatch: {}

permissions:
  contents: write

jobs:
  backfill:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: dev

      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Backfill archive from EmailOctopus
        env:
          EMAILOCTOPUS_API_KEY: ${{ secrets.EMAILOCTOPUS_API_KEY }}
        run: node scripts/backfill-newsletters.mjs

      - name: Commit and push if changed
        run: |
          git add emails/
          if git diff --cached --quiet; then
            echo "No new newsletter issues to backfill."
            exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git commit -m "Backfill archived newsletter issues"
          git push origin HEAD:dev
